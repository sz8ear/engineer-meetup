<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2a1a4e"/>
      <stop offset="100%" stop-color="#1A1A2E"/>
    </radialGradient>
    <linearGradient id="beer" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF6B9D"/>
      <stop offset="100%" stop-color="#B5179E"/>
    </linearGradient>
    <linearGradient id="foam" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FAFAFA"/>
      <stop offset="100%" stop-color="#4CC9F0"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <circle cx="16" cy="16" r="16" fill="url(#bg)"/>

  <!-- mug body -->
  <path d="M9 10 L10.5 26 H19.5 L21 10 Z" fill="url(#beer)"/>

  <!-- mug handle -->
  <path d="M21 13 Q26 13 26 17 Q26 21 21 21" fill="none" stroke="url(#beer)" stroke-width="2.2" stroke-linecap="round"/>

  <!-- foam -->
  <ellipse cx="15" cy="10" rx="6" ry="3" fill="url(#foam)" opacity="0.95"/>
  <circle cx="12" cy="8.5" r="2" fill="white" opacity="0.9"/>
  <circle cx="16" cy="7.5" r="2.2" fill="white" opacity="0.95"/>
  <circle cx="19.5" cy="8.5" r="1.8" fill="white" opacity="0.85"/>

  <!-- neon ring -->
  <circle cx="16" cy="16" r="15.5" fill="none" stroke="#FF6B9D" stroke-width="0.5" opacity="0.4"/>
</svg>
